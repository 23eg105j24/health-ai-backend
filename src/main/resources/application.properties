# ============================================================
#  Health AI — Application Configuration
# ============================================================

# Server
server.port=8080

# ── Database (MySQL) ─────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/health_ai_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Root@1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Connection Pool ───────────────────────────────────────────
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ──────────────────────────────────────────────────────
app.jwt.secret=ZmQ0ZGI5NjQ0MDQwY2I4MjMxY2Y3ZmI3MjBhNjdkNGIyZTBhOGY3M2Q5YWZkZTJkZGZkY2Q5NDIzMTcwYg==
app.jwt.expiration-ms=86400000

# ── CORS ─────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173

# ── Logging ──────────────────────────────────────────────────
logging.level.com.healthai=INFO
logging.level.org.springframework.security=WARN

spring.jpa.open-in-view=false